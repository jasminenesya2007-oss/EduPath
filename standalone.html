<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPath Smada - Konselor Pendidikan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF & Markdown -->
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html2canvas@latest/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FA; }
        .loading-screen { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .prose p { margin-bottom: 1rem; }
        .prose ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-gray-500 font-medium">Memuat EduPath Smada...</p>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Komponen Icon Sederhana ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const SUBJECT_LABELS = {
            bahasaIndonesia: 'B. Indonesia', bahasaInggris: 'B. Inggris', matematika: 'Matematika',
            ipa: 'IPA', ips: 'IPS', informatika: 'Informatika', sejarah: 'Sejarah', agama: 'Agama',
            pendidikanPancasila: 'Pancasila', pkwu: 'PKWU', bahasaJawa: 'B. Jawa',
        };

        const CLASS_OPTIONS = [
            { id: 1, subjects: ["Kimia", "Biologi", "Sosiologi", "Bahasa Jepang"] },
            { id: 2, subjects: ["Kimia", "Biologi", "Geografi", "Bahasa Jepang"] },
            { id: 3, subjects: ["Fisika", "Antropologi", "Matematika Tingkat Lanjut", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 4, subjects: ["Informatika", "Matematika Tingkat Lanjut", "Sejarah Tingkat Lanjut", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 5, subjects: ["Bahasa Jepang", "Bahasa Inggris Lanjut", "Antropologi", "Sejarah Tingkat Lanjut"] },
            { id: 6, subjects: ["Matematika Tingkat Lanjut", "Fisika", "Bahasa Inggris Tingkat Lanjut", "Geografi"] },
            { id: 7, subjects: ["Ekonomi", "Bahasa Indonesia Tingkat Lanjut", "Matematika Tingkat Lanjut", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 8, subjects: ["Bahasa Indonesia Tingkat Lanjut", "Sosiologi", "Ekonomi", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 9, subjects: ["Matematika Tingkat Lanjut", "Ekonomi", "Geografi", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 10, subjects: ["Matematika Tingkat Lanjut", "Ekonomi", "Sejarah Tingkat Lanjut", "Bahasa Inggris Tingkat Lanjut"] },
        ];

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('GEMINI_API_KEY') || '');
            const [showApiModal, setShowApiModal] = useState(!localStorage.getItem('GEMINI_API_KEY'));
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const reportRef = useRef(null);

            const [formData, setFormData] = useState({
                name: '', className: '', attendanceNumber: '',
                grades: { bahasaIndonesia: 80, bahasaInggris: 80, matematika: 80, ipa: 80, ips: 80, informatika: 80, sejarah: 80, agama: 80, pendidikanPancasila: 80, pkwu: 80, bahasaJawa: 80 },
                interests: '', talents: '', aspirations: '',
            });

            useEffect(() => {
                document.getElementById('loading').style.display = 'none';
                if (window.lucide) window.lucide.createIcons();
            }, []);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleGradeChange = (subject, value) => {
                setFormData(prev => ({ ...prev, grades: { ...prev.grades, [subject]: parseInt(value) || 0 } }));
            };

            const saveApiKey = (key) => {
                if (!key) return;
                localStorage.setItem('GEMINI_API_KEY', key);
                setApiKey(key);
                setShowApiModal(false);
            };

            const handleSubmit = async () => {
                if (!apiKey) { setShowApiModal(true); return; }
                setLoading(true);
                try {
                    const prompt = `Analisis data siswa kelas 10 Kurikulum Merdeka. Nama: ${formData.name}, Nilai: ${JSON.stringify(formData.grades)}, Minat: ${formData.interests}, Bakat: ${formData.talents}, Cita-cita: ${formData.aspirations}. Berikan rekomendasi 3 paket kelas terbaik dari daftar ini: ${CLASS_OPTIONS.map(o => o.id + ". " + o.subjects.join(", ")).join("; ")}. Output HARUS JSON murni: { "topRecommendations": [{ "optionId": number, "subjects": [], "percentage": number, "reasoning": "", "suggestedMajors": [] }], "generalAdvice": "" }`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const text = data.candidates[0].content.parts[0].text;
                    const cleanJson = text.replace(/```json|```/g, '').trim();
                    setResult(JSON.parse(cleanJson));
                    setStep(4);
                } catch (e) {
                    alert("Error: " + e.message + ". Pastikan API Key benar.");
                } finally {
                    setLoading(false);
                }
            };

            const downloadPDF = async () => {
                const canvas = await html2canvas(reportRef.current, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, (canvas.height * pdfWidth) / canvas.width);
                pdf.save(`EduPath_Report_${formData.name}.pdf`);
            };

            return (
                <div className="min-h-screen flex flex-col pb-10">
                    {showApiModal && (
                        <div className="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
                                <h3 className="text-xl font-bold mb-2">Masukkan Gemini API Key</h3>
                                <p className="text-sm text-gray-500 mb-6">Dapatkan gratis di <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-indigo-600 font-bold underline">Google AI Studio</a></p>
                                <input id="api-input" type="password" placeholder="AIzaSy..." className="w-full px-4 py-3 rounded-xl border border-gray-200 mb-4 outline-none focus:border-indigo-600" />
                                <button onClick={() => saveApiKey(document.getElementById('api-input').value)} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">Simpan & Mulai</button>
                            </div>
                        </div>
                    )}

                    <header className="bg-white border-b border-gray-200 p-4 sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 p-2 rounded-lg text-white"><Icon name="graduation-cap" /></div>
                                <h1 className="font-bold text-lg">EduPath Smada</h1>
                            </div>
                            <button onClick={() => setShowApiModal(true)} className="text-xs text-gray-400">Ganti API Key</button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto w-full p-4 mt-6">
                        {step === 1 && (
                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                <h2 className="text-2xl font-bold mb-6">Identitas Siswa</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                    <div><label className="block text-xs font-bold text-gray-400 mb-2">NAMA</label><input type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full p-3 rounded-lg border border-gray-200" /></div>
                                    <div><label className="block text-xs font-bold text-gray-400 mb-2">KELAS</label><input type="text" name="className" value={formData.className} onChange={handleInputChange} className="w-full p-3 rounded-lg border border-gray-200" /></div>
                                    <div><label className="block text-xs font-bold text-gray-400 mb-2">ABSEN</label><input type="text" name="attendanceNumber" value={formData.attendanceNumber} onChange={handleInputChange} className="w-full p-3 rounded-lg border border-gray-200" /></div>
                                </div>
                                <button onClick={() => setStep(2)} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Lanjut ke Nilai</button>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                <h2 className="text-2xl font-bold mb-6">Input Nilai Kelas 10</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                                    {Object.entries(formData.grades).map(([key, value]) => (
                                        <div key={key}>
                                            <label className="flex justify-between text-xs font-bold mb-2"><span>{SUBJECT_LABELS[key]}</span> <span className="text-indigo-600">{value}</span></label>
                                            <input type="range" min="0" max="100" value={value} onChange={(e) => handleGradeChange(key, e.target.value)} className="w-full h-1.5 bg-gray-100 rounded-lg appearance-none accent-indigo-600" />
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep(1)} className="flex-1 bg-gray-100 py-3 rounded-xl font-bold">Kembali</button>
                                    <button onClick={() => setStep(3)} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">Lanjut</button>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                <h2 className="text-2xl font-bold mb-6">Minat & Bakat</h2>
                                <div className="space-y-6 mb-8">
                                    <div><label className="block text-xs font-bold text-gray-400 mb-2">MINAT & BAKAT</label><textarea name="interests" value={formData.interests} onChange={handleInputChange} rows={3} className="w-full p-3 rounded-lg border border-gray-200" placeholder="Apa yang kamu sukai dan kuasai?" /></div>
                                    <div><label className="block text-xs font-bold text-gray-400 mb-2">CITA-CITA</label><textarea name="aspirations" value={formData.aspirations} onChange={handleInputChange} rows={3} className="w-full p-3 rounded-lg border border-gray-200" placeholder="Ingin jadi apa nanti?" /></div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep(2)} className="flex-1 bg-gray-100 py-3 rounded-xl font-bold">Kembali</button>
                                    <button onClick={handleSubmit} disabled={loading} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                                        {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : "Analisis Sekarang"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 4 && result && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-bold">Hasil Rekomendasi</h2>
                                    <div className="flex gap-2">
                                        <button onClick={downloadPDF} className="bg-white border p-2 rounded-lg"><Icon name="download" /></button>
                                        <button onClick={() => setStep(1)} className="bg-indigo-50 text-indigo-600 p-2 rounded-lg"><Icon name="refresh-cw" /></button>
                                    </div>
                                </div>
                                <div ref={reportRef} className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                                    <div className="border-b pb-6 mb-6">
                                        <h3 className="text-xl font-bold">{formData.name}</h3>
                                        <p className="text-gray-500">Kelas {formData.className} • Absen {formData.attendanceNumber}</p>
                                    </div>
                                    <div className="space-y-6">
                                        {result.topRecommendations.map((rec, idx) => (
                                            <div key={idx} className={`p-6 rounded-2xl border ${idx === 0 ? 'bg-indigo-50 border-indigo-100' : 'bg-gray-50 border-gray-100'}`}>
                                                <div className="flex justify-between mb-4">
                                                    <h5 className="font-bold">Opsi Kelas {rec.optionId}</h5>
                                                    <span className="text-2xl font-black text-indigo-600">{rec.percentage}%</span>
                                                </div>
                                                <div className="flex flex-wrap gap-2 mb-4">
                                                    {rec.subjects.map((s, i) => <span key={i} className="text-[10px] bg-white px-2 py-1 rounded-full border">{s}</span>)}
                                                </div>
                                                <p className="text-sm text-gray-600 mb-4">{rec.reasoning}</p>
                                                <div className="flex flex-wrap gap-1">
                                                    {rec.suggestedMajors.map((m, i) => <span key={i} className="text-[10px] font-bold text-indigo-700 bg-indigo-100 px-2 py-0.5 rounded">{m}</span>)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-8 bg-gray-900 text-white p-6 rounded-2xl">
                                        <h4 className="text-xs font-bold text-indigo-400 mb-4 uppercase">Saran Pengembangan</h4>
                                        <div className="prose prose-invert text-sm" dangerouslySetInnerHTML={{ __html: marked.parse(result.generalAdvice) }} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
