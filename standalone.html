<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPath Smada - Konselor Pendidikan Cerdas</title>
    <!-- Tailwind CSS 3 CDN (Lebih stabil untuk standalone) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF Libraries -->
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html2canvas@latest/dist/html2canvas.min.js"></script>
    <!-- Framer Motion (Motion) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Markdown -->
    <script src="https://unpkg.com/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 1rem; }
        .prose li { color: #d1d5db; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #4f46e5;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-[#F8F9FA] text-[#1A1A1A]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Icons Component Helper ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SUBJECT_LABELS = {
            bahasaIndonesia: 'Bahasa Indonesia',
            bahasaInggris: 'Bahasa Inggris',
            matematika: 'Matematika',
            ipa: 'IPA',
            ips: 'IPS',
            informatika: 'Informatika',
            sejarah: 'Sejarah',
            agama: 'Agama',
            pendidikanPancasila: 'Pendidikan Pancasila',
            pkwu: 'PKWU',
            bahasaJawa: 'Bahasa Jawa',
        };

        const CLASS_OPTIONS = [
            { id: 1, subjects: ["Kimia", "Biologi", "Sosiologi", "Bahasa Jepang"] },
            { id: 2, subjects: ["Kimia", "Biologi", "Geografi", "Bahasa Jepang"] },
            { id: 3, subjects: ["Fisika", "Antropologi", "Matematika Tingkat Lanjut", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 4, subjects: ["Informatika", "Matematika Tingkat Lanjut", "Sejarah Tingkat Lanjut", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 5, subjects: ["Bahasa Jepang", "Bahasa Inggris Lanjut", "Antropologi", "Sejarah Tingkat Lanjut"] },
            { id: 6, subjects: ["Matematika Tingkat Lanjut", "Fisika", "Bahasa Inggris Tingkat Lanjut", "Geografi"] },
            { id: 7, subjects: ["Ekonomi", "Bahasa Indonesia Tingkat Lanjut", "Matematika Tingkat Lanjut", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 8, subjects: ["Bahasa Indonesia Tingkat Lanjut", "Sosiologi", "Ekonomi", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 9, subjects: ["Matematika Tingkat Lanjut", "Ekonomi", "Geografi", "Bahasa Inggris Tingkat Lanjut"] },
            { id: 10, subjects: ["Matematika Tingkat Lanjut", "Ekonomi", "Sejarah Tingkat Lanjut", "Bahasa Inggris Tingkat Lanjut"] },
        ];

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('GEMINI_API_KEY') || '');
            const [showApiModal, setShowApiModal] = useState(!localStorage.getItem('GEMINI_API_KEY'));
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const reportRef = useRef(null);

            const [formData, setFormData] = useState({
                name: '',
                className: '',
                attendanceNumber: '',
                grades: {
                    bahasaIndonesia: 80, bahasaInggris: 80, matematika: 80, ipa: 80, ips: 80,
                    informatika: 80, sejarah: 80, agama: 80, pendidikanPancasila: 80, pkwu: 80, bahasaJawa: 80,
                },
                interests: '', talents: '', aspirations: '',
            });

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleGradeChange = (subject, value) => {
                const numValue = Math.min(100, Math.max(0, parseInt(value) || 0));
                setFormData(prev => ({
                    ...prev,
                    grades: { ...prev.grades, [subject]: numValue }
                }));
            };

            const saveApiKey = (key) => {
                localStorage.setItem('GEMINI_API_KEY', key);
                setApiKey(key);
                setShowApiModal(false);
            };

            const getCounseling = async (data) => {
                const prompt = `
                    Anda adalah konselor pendidikan ahli untuk Kurikulum Merdeka di Indonesia.
                    Tugas Anda adalah menganalisis data siswa kelas 10 untuk memberikan rekomendasi 3 paket mata pelajaran pilihan (kelas) terbaik dari 10 opsi yang tersedia.
                    Data Siswa: Nama: ${data.name}, Nilai: ${JSON.stringify(data.grades)}, Minat: ${data.interests}, Bakat: ${data.talents}, Cita-cita: ${data.aspirations}
                    Daftar Opsi Kelas: ${CLASS_OPTIONS.map(opt => `${opt.id}. ${opt.subjects.join(", ")}`).join("\n")}
                    Output harus dalam format JSON murni: { "topRecommendations": [{ "optionId": number, "subjects": [], "percentage": number, "reasoning": "", "suggestedMajors": [] }], "generalAdvice": "" }
                `;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const json = await response.json();
                const text = json.candidates[0].content.parts[0].text;
                // Clean JSON from markdown if any
                const cleanJson = text.replace(/```json|```/g, '').trim();
                return JSON.parse(cleanJson);
            };

            const handleSubmit = async () => {
                if (!apiKey) { setShowApiModal(true); return; }
                setLoading(true);
                try {
                    const res = await getCounseling(formData);
                    setResult(res);
                    setStep(4);
                } catch (error) {
                    console.error(error);
                    alert("Gagal memproses data. Pastikan API Key benar.");
                } finally {
                    setLoading(false);
                }
            };

            const downloadPDF = async () => {
                const canvas = await html2canvas(reportRef.current, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`EduPath_Report_${formData.name}.pdf`);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* API Key Modal */}
                    {showApiModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl space-y-6">
                                <div className="text-center space-y-2">
                                    <h3 className="text-2xl font-bold">Masukkan Gemini API Key</h3>
                                    <p className="text-sm text-gray-500">Dapatkan gratis di <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-indigo-600 underline">Google AI Studio</a></p>
                                </div>
                                <input 
                                    type="password" 
                                    placeholder="AIzaSy..." 
                                    className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none"
                                    onKeyDown={(e) => e.key === 'Enter' && saveApiKey(e.target.value)}
                                    id="api-input"
                                />
                                <button 
                                    onClick={() => saveApiKey(document.getElementById('api-input').value)}
                                    className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all"
                                >
                                    Simpan & Mulai
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="bg-white border-b border-gray-200 sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <Icon name="graduation-cap" size={24} />
                                </div>
                                <div>
                                    <h1 className="font-bold text-lg">EduPath Smada</h1>
                                    <p className="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Kurikulum Merdeka</p>
                                </div>
                            </div>
                            <button onClick={() => setShowApiModal(true)} className="text-xs text-gray-400 hover:text-indigo-600">Ganti API Key</button>
                        </div>
                    </header>

                    <main className="flex-grow max-w-4xl mx-auto px-4 py-12 w-full">
                        <AnimatePresence mode="wait">
                            {step === 1 && (
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="space-y-8">
                                    <div className="text-center space-y-2">
                                        <h2 className="text-3xl font-bold">Selamat Datang!</h2>
                                        <p className="text-gray-500">Lengkapi identitas dirimu untuk memulai.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2"><Icon name="user" size={14} /> Nama</label>
                                                <input type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-indigo-500" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2"><Icon name="book-open" size={14} /> Kelas</label>
                                                <input type="text" name="className" value={formData.className} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-indigo-500" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2"><Icon name="award" size={14} /> Absen</label>
                                                <input type="text" name="attendanceNumber" value={formData.attendanceNumber} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-indigo-500" />
                                            </div>
                                        </div>
                                        <div className="flex justify-end"><button onClick={() => setStep(2)} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2">Lanjut <Icon name="chevron-right" size={18} /></button></div>
                                    </div>
                                </motion.div>
                            )}

                            {step === 2 && (
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="space-y-8">
                                    <div className="text-center space-y-2"><h2 className="text-3xl font-bold">Input Nilai</h2><p className="text-gray-500">Geser sesuai nilai rata-rata mata pelajaranmu.</p></div>
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {Object.entries(formData.grades).map(([key, value]) => (
                                                <div key={key} className="space-y-2">
                                                    <label className="text-xs font-bold text-gray-500 flex justify-between">{SUBJECT_LABELS[key]} <span className="text-indigo-600">{value}</span></label>
                                                    <input type="range" min="0" max="100" value={value} onChange={(e) => handleGradeChange(key, e.target.value)} className="w-full h-1.5 bg-gray-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                                </div>
                                            ))}
                                        </div>
                                        <div className="pt-8 flex justify-between">
                                            <button onClick={() => setStep(1)} className="text-gray-500 font-bold flex items-center gap-2"><Icon name="chevron-left" size={18} /> Kembali</button>
                                            <button onClick={() => setStep(3)} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2">Lanjut <Icon name="chevron-right" size={18} /></button>
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {step === 3 && (
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="space-y-8">
                                    <div className="text-center space-y-2"><h2 className="text-3xl font-bold">Minat & Bakat</h2><p className="text-gray-500">Bantu kami mengenalmu lebih dalam.</p></div>
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 space-y-6">
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2"><Icon name="sparkles" size={14} /> Minat</label>
                                            <textarea name="interests" value={formData.interests} onChange={handleInputChange} rows={3} className="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-indigo-500" placeholder="Apa yang kamu sukai?" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2"><Icon name="target" size={14} /> Cita-cita</label>
                                            <textarea name="aspirations" value={formData.aspirations} onChange={handleInputChange} rows={3} className="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-indigo-500" placeholder="Ingin jadi apa nanti?" />
                                        </div>
                                        <div className="flex justify-between">
                                            <button onClick={() => setStep(2)} className="text-gray-500 font-bold flex items-center gap-2"><Icon name="chevron-left" size={18} /> Kembali</button>
                                            <button onClick={handleSubmit} disabled={loading} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2">
                                                {loading ? <Icon name="refresh-cw" className="animate-spin" size={18} /> : "Analisis Sekarang"}
                                            </button>
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {step === 4 && result && (
                                <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="space-y-8">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-3xl font-bold">Hasil Rekomendasi</h2>
                                        <div className="flex gap-2">
                                            <button onClick={downloadPDF} className="bg-white border border-gray-200 px-4 py-2 rounded-xl font-bold flex items-center gap-2"><Icon name="download" size={18} /> PDF</button>
                                            <button onClick={() => setStep(1)} className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold"><Icon name="refresh-cw" size={18} /></button>
                                        </div>
                                    </div>
                                    <div ref={reportRef} className="bg-white p-10 rounded-[2rem] shadow-xl border border-gray-100 space-y-10">
                                        <div className="border-b pb-8">
                                            <h3 className="text-2xl font-bold">{formData.name}</h3>
                                            <p className="text-gray-500">Kelas {formData.className} • Absen {formData.attendanceNumber}</p>
                                        </div>
                                        <div className="space-y-6">
                                            <h4 className="text-xs font-bold uppercase tracking-widest text-indigo-600">Top 3 Pilihan Kelas</h4>
                                            {result.topRecommendations.map((rec, idx) => (
                                                <div key={idx} className={`p-6 rounded-2xl border ${idx === 0 ? 'bg-indigo-50/50 border-indigo-100' : 'bg-gray-50/50 border-gray-100'}`}>
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <h5 className="font-bold text-lg">Opsi Kelas {rec.optionId}</h5>
                                                            <div className="flex flex-wrap gap-2 mt-2">
                                                                {rec.subjects.map((s, i) => <span key={i} className="text-[10px] bg-white px-2 py-1 rounded-full border border-gray-200">{s}</span>)}
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="text-3xl font-black text-indigo-600">{rec.percentage}%</div>
                                                            <p className="text-[10px] font-bold text-gray-400">COCOK</p>
                                                        </div>
                                                    </div>
                                                    <div className="mt-4 pt-4 border-t border-white grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <div><p className="text-[10px] font-bold text-gray-400 uppercase mb-1">Alasan</p><p className="text-sm text-gray-600">{rec.reasoning}</p></div>
                                                        <div><p className="text-[10px] font-bold text-gray-400 uppercase mb-1">Jurusan</p><div className="flex flex-wrap gap-1">{rec.suggestedMajors.map((m, i) => <span key={i} className="text-[10px] font-bold text-indigo-700 bg-indigo-100 px-2 py-0.5 rounded">{m}</span>)}</div></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="bg-gray-900 text-white p-8 rounded-3xl">
                                            <h4 className="text-xs font-bold uppercase tracking-widest text-indigo-400 mb-4">Saran Pengembangan</h4>
                                            <div className="prose prose-invert prose-sm" dangerouslySetInnerHTML={{ __html: marked.parse(result.generalAdvice) }} />
                                        </div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    <footer className="py-8 border-t border-gray-100 text-center text-gray-400 text-sm">
                        <p>&copy; 2024 EduPath Smada - Kurikulum Merdeka</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
